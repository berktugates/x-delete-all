name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller build
      - name: Run tests
        run: |
          python -m pip install pytest responses
          pytest -q
      - name: Build wheel
        run: |
          python -m build --wheel --no-isolation
      - name: Build single-file executable (PyInstaller)
        run: |
          pyinstaller --onefile --name x-delete-all x_delete_all/cli.py || true
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/*.whl artifacts/ 2>/dev/null || true
          if [ -f dist/x-delete-all ]; then cp dist/x-delete-all artifacts/x-delete-all-${{ matrix.os }}; fi || true
          if [ -f dist/x-delete-all.exe ]; then cp dist/x-delete-all.exe artifacts/x-delete-all-${{ matrix.os }}.exe; fi || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: artifacts/**
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: Automated release
          draft: false
          prerelease: false
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-ubuntu-latest
      - name: Upload release assets
        uses: actions/upload-release-asset@v2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts
          asset_name: build-artifacts-ubuntu-latest.zip
          asset_content_type: application/zip
